<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPGA 定点数转换专家</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #22d3ee;
            --error: #f43f5e;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 {
            margin-top: 0;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            font-size: 1.8rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.8rem;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .result-panel {
            background: rgba(15, 23, 42, 0.5);
            padding: 1.5rem;
            border-radius: 1rem;
            margin-top: 2rem;
            border-left: 4px solid var(--primary);
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .result-item:last-child { margin-bottom: 0; }

        .label { font-size: 0.85rem; color: #94a3b8; }
        .value { font-family: 'Consolas', monospace; font-weight: 600; color: var(--accent); font-size: 1.2rem; }
        
        .error-value { color: var(--error); }

        .q-format-hint {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.5rem;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>FPGA Quantization Tool</h2>
    
    <div class="input-group">
        <label>浮点数值 (Float Value)</label>
        <input type="number" id="floatInput" step="any" placeholder="例如: 0.75" value="0.75">
    </div>

    <div class="input-group">
        <label>量化位数 (Total Bits)</label>
        <input type="number" id="bitsInput" value="16" min="2" max="64">
        <div class="q-format-hint">默认采用 Q1.(N-1) 格式（即1位符号位，其余为小数位）</div>
    </div>

    <div class="result-panel">
        <div class="result-item">
            <span class="label">定点整数 (Dec)</span>
            <span class="value" id="decResult">-</span>
        </div>
        <div class="result-item">
            <span class="label">十六进制补码 (Hex)</span>
            <span class="value" id="hexResult">-</span>
        </div>
        <div class="result-item">
            <span class="label">量化误差率 (Error)</span>
            <span class="value error-value" id="errorResult">-</span>
        </div>
    </div>
</div>

<script>
    const floatInput = document.getElementById('floatInput');
    const bitsInput = document.getElementById('bitsInput');
    const decResult = document.getElementById('decResult');
    const hexResult = document.getElementById('hexResult');
    const errorResult = document.getElementById('errorResult');

    function calculate() {
        const val = parseFloat(floatInput.value);
        const bits = parseInt(bitsInput.value);

        if (isNaN(val) || isNaN(bits)) return;

        // 1. 计算缩放因子 (Q1.N-1 格式，即 fractional bits = bits - 1)
        const fracBits = bits - 1;
        const scale = Math.pow(2, fracBits);

        // 2. 计算量化后的整数值 (带四舍五入)
        let quantizedInt = Math.round(val * scale);

        // 3. 边界处理 (溢出检查)
        const maxVal = Math.pow(2, bits - 1) - 1;
        const minVal = -Math.pow(2, bits - 1);
        
        if (quantizedInt > maxVal) quantizedInt = maxVal;
        if (quantizedInt < minVal) quantizedInt = minVal;

        // 4. 计算反量化值及误差
        const deQuantized = quantizedInt / scale;
        const error = val === 0 ? 0 : Math.abs((val - deQuantized) / val) * 100;

        // 5. 转补码十六进制
        let hexStr;
        if (quantizedInt >= 0) {
            hexStr = quantizedInt.toString(16).toUpperCase();
        } else {
            // 负数补码处理
            hexStr = (BigInt(Math.pow(2, bits)) + BigInt(quantizedInt)).toString(16).toUpperCase();
        }
        
        // 自动补齐十六进制长度
        const hexLen = Math.ceil(bits / 4);
        hexStr = hexStr.padStart(hexLen, '0');

        // 6. 更新 UI
        decResult.innerText = quantizedInt;
        hexResult.innerText = '0x' + hexStr;
        errorResult.innerText = error.toFixed(6) + '%';
    }

    [floatInput, bitsInput].forEach(el => el.addEventListener('input', calculate));
    
    // 初始化执行一次
    calculate();
</script>

</body>
</html>
