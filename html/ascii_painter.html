<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ASCII ARCHITECT v3.1 - 无限视角版</title>
    <style>
        :root {
            --bg-color: #0f172a; --panel-bg: #1e293b; --accent-color: #38bdf8;
            --text-color: #f8fafc; --border-color: #334155; --grid-size: 20px;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        header { padding: 0.8rem 2rem; background: var(--panel-bg); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        main { display: flex; flex: 1; overflow: hidden; }
        .toolbar { width: 95px; background: var(--panel-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 6px; z-index: 10; }
        .tool-btn { width: 75px; height: 42px; border-radius: 6px; border: 1px solid var(--border-color); background: #2d3748; color: white; cursor: pointer; font-size: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tool-btn.active { background: var(--accent-color); color: var(--bg-color); font-weight: bold; }
        #canvas-container { flex: 1; position: relative; background: #0f172a; overflow: hidden; cursor: crosshair; }
        /* 网格现在随视角移动 */
        #grid-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        canvas { position: absolute; top: 0; left: 0; }
        .preview-panel { width: 450px; background: #000; border-left: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 10; }
        #ascii-output { flex: 1; padding: 15px; font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; line-height: 1.1; color: #10b981; background: #000; border: none; outline: none; white-space: pre; overflow: auto; }
        .btn-action { padding: 5px 12px; background: var(--accent-color); border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
        .status-bar { padding: 4px 10px; background: #334155; font-size: 10px; color: #cbd5e1; }
    </style>
</head>
<body>

<header>
    <div><span style="color: var(--accent-color); font-weight: bold;">ASCII ARCHITECT v3.1</span></div>
    <div style="font-size: 12px; color: #94a3b8;">[空格+左键] 拖拽画布范围 | [右键] 删除</div>
    <button class="btn-action" style="background: #ef4444; color: white;" onclick="clearCanvas()">清空画布</button>
</header>

<main>
    <div class="toolbar">
        <button class="tool-btn" id="tool-select" onclick="setTool('select')">点选<span>Select</span></button>
        <div style="height:1px; width:70%; background:var(--border-color); margin:5px 0;"></div>
        <button class="tool-btn active" id="tool-brush" onclick="setTool('brush')">画笔<span>Brush</span></button>
        <button class="tool-btn" id="tool-rect" onclick="setTool('rect')">矩形<span>Rect</span></button>
        <button class="tool-btn" id="tool-text" onclick="setTool('text')">文字<span>Text</span></button>
        <button class="tool-btn" id="tool-line" onclick="setTool('line')">直线<span>Line</span></button>
        <button class="tool-btn" id="tool-arrow1" onclick="setTool('arrow1')">单箭头<span>Arrow</span></button>
        <button class="tool-btn" id="tool-arrow2" onclick="setTool('arrow2')">双箭头<span>Double</span></button>
    </div>
    
    <div id="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="preview-panel">
        <div style="padding:10px; background:#1e293b; display:flex; justify-content:space-between;"><span>实时预览</span><button class="btn-action" onclick="copyToClipboard()">复制</button></div>
        <textarea id="ascii-output" readonly></textarea>
        <div class="status-bar" id="pos-info">Offset: 0, 0</div>
    </div>
</main>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const output = document.getElementById('ascii-output');
    const container = document.getElementById('canvas-container');
    const GRID = 20;

    // 视角偏移变量
    let camX = 0, camY = 0;
    let isPanning = false, spacePressed = false;

    let elements = [], currentTool = 'brush', isDrawing = false, dragMode = null;
    let currentPath = []; 
    let startX, startY, lastMouseX, lastMouseY, selectedIdx = -1, activeHandle = null;
    let asciiTimer = null;

    function resize() { canvas.width = container.offsetWidth; canvas.height = container.offsetHeight; draw(); }
    window.onresize = resize; resize();

    // 键盘监听
    window.onkeydown = (e) => { if(e.code === 'Space') { spacePressed = true; container.style.cursor = 'grab'; } };
    window.onkeyup = (e) => { if(e.code === 'Space') { spacePressed = false; isPanning = false; container.style.cursor = 'crosshair'; } };

    function setTool(t) { 
        currentTool = t; isDrawing = false;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.id === 'tool-'+t));
        if (t !== 'select') selectedIdx = -1;
        draw();
    }
    
    // 关键改变：坐标需要加上偏移量
    function snap(v, offset) { return Math.round((v - offset) / GRID) * GRID; }
    function toWorldX(x) { return x - camX; }
    function toWorldY(y) { return y - camY; }

    function distToSegment(px, py, x1, y1, x2, y2) {
        const l2 = (x2-x1)**2 + (y2-y1)**2;
        if (l2 === 0) return Math.sqrt((px-x1)**2 + (py-y1)**2);
        let t = ((px-x1)*(x2-x1) + (py-y1)*(y2-y1)) / l2;
        t = Math.max(0, Math.min(1, t));
        return Math.sqrt((px - (x1 + t*(x2-x1)))**2 + (py - (y1 + t*(y2-y1)))**2);
    }

    function getElementAt(mx, my) {
        const x = toWorldX(mx), y = toWorldY(my);
        for (let i = elements.length - 1; i >= 0; i--) {
            const el = elements[i];
            if (el.type === 'poly') {
                for (let j = 0; j < el.points.length - 1; j++) {
                    if (distToSegment(x, y, el.points[j].x, el.points[j].y, el.points[j+1].x, el.points[j+1].y) < 10) return i;
                }
            } else if (el.type === 'rect') {
                const nearEdge = distToSegment(x,y,el.x1,el.y1,el.x2,el.y1) < 10 || distToSegment(x,y,el.x2,el.y1,el.x2,el.y2) < 10 ||
                                 distToSegment(x,y,el.x2,el.y2,el.x1,el.y2) < 10 || distToSegment(x,y,el.x1,el.y2,el.x1,el.y1) < 10;
                if (nearEdge) return i;
            } else if (el.type === 'text') {
                if (x >= el.x1 && x <= el.x1 + el.text.length*12 && y >= el.y1 && y <= el.y1+GRID) return i;
            } else {
                if (distToSegment(x, y, el.x1, el.y1, el.x2, el.y2) < 10) return i;
            }
        }
        return -1;
    }

    function getHandleAt(el, mx, my) {
        if (!el || el.type === 'text' || el.type === 'poly') return null;
        const x = toWorldX(mx), y = toWorldY(my);
        const pts = el.type === 'rect' 
            ? [{x:el.x1,y:el.y1,id:'p1'},{x:el.x2,y:el.y1,id:'p2'},{x:el.x1,y:el.y2,id:'p3'},{x:el.x2,y:el.y2,id:'p4'}]
            : [{x:el.x1,y:el.y1,id:'p1'},{x:el.x2,y:el.y2,id:'p4'}];
        return pts.find(p => Math.sqrt((x-p.x)**2 + (y-p.y)**2) < 15) || null;
    }

    canvas.onmousedown = (e) => {
        const mx = e.offsetX, my = e.offsetY;
        
        // 空格平移逻辑
        if (spacePressed) {
            isPanning = true; lastMouseX = mx; lastMouseY = my;
            container.style.cursor = 'grabbing';
            return;
        }

        const sx = snap(mx, camX), sy = snap(my, camY);
        if (e.button === 2) {
            const hit = getElementAt(mx, my);
            if (hit !== -1) { elements.splice(hit, 1); scheduleASCII(); draw(); }
            return;
        }

        if (currentTool === 'select') {
            activeHandle = selectedIdx !== -1 ? getHandleAt(elements[selectedIdx], mx, my) : null;
            if (activeHandle) { dragMode = 'resize'; isDrawing = true; } 
            else {
                const hit = getElementAt(mx, my);
                if (hit !== -1) { selectedIdx = hit; dragMode = 'move'; isDrawing = true; lastMouseX = mx; lastMouseY = my; } 
                else { selectedIdx = -1; }
            }
        } else if (currentTool === 'brush') {
            isDrawing = true; currentPath = [{x:sx, y:sy}];
        } else if (currentTool === 'text') {
            const t = prompt("输入文本:");
            if (t) { elements.push({type:'text', x1:sx, y1:sy, text:t}); scheduleASCII(); }
        } else {
            isDrawing = true; dragMode = 'create'; startX = sx; startY = sy; currentX = sx; currentY = sy;
        }
        draw();
    };

    canvas.onmousemove = (e) => {
        const mx = e.offsetX, my = e.offsetY;
        const sx = snap(mx, camX), sy = snap(my, camY);

        if (isPanning) {
            camX += (mx - lastMouseX);
            camY += (my - lastMouseY);
            lastMouseX = mx; lastMouseY = my;
            document.getElementById('pos-info').innerText = `Offset: ${Math.round(camX)}, ${Math.round(camY)}`;
            draw(); return;
        }

        if (!isDrawing && currentTool !== 'brush') return;

        if (currentTool === 'brush' && isDrawing) {
            const last = currentPath[currentPath.length - 1];
            if (sx === last.x && sy === last.y) return;
            const hitIdx = currentPath.findIndex(p => p.x === sx && p.y === sy);
            if (hitIdx !== -1 && hitIdx < currentPath.length - 1) { currentPath = currentPath.slice(0, hitIdx + 1); } 
            else {
                if (sx !== last.x && sy !== last.y) currentPath.push({x: sx, y: last.y});
                currentPath.push({x: sx, y: sy});
            }
            scheduleASCII();
        } else if (dragMode === 'move' && selectedIdx !== -1) {
            const el = elements[selectedIdx];
            const dx = snap(mx, camX) - snap(lastMouseX, camX);
            const dy = snap(my, camY) - snap(lastMouseY, camY);
            if (dx !== 0 || dy !== 0) {
                if (el.type === 'poly') el.points.forEach(p => { p.x += dx; p.y += dy; });
                else { el.x1 += dx; el.y1 += dy; if(el.x2 !== undefined){el.x2 += dx; el.y2 += dy;} }
                lastMouseX = mx; lastMouseY = my; scheduleASCII();
            }
        } else if (dragMode === 'resize' && selectedIdx !== -1) {
            const el = elements[selectedIdx];
            if (activeHandle.id === 'p1') { el.x1 = sx; el.y1 = sy; }
            else if (activeHandle.id === 'p2') { el.x2 = sx; el.y1 = sy; }
            else if (activeHandle.id === 'p3') { el.x1 = sx; el.y2 = sy; }
            else if (activeHandle.id === 'p4') { el.x2 = sx; el.y2 = sy; }
            scheduleASCII();
        } else if (dragMode === 'create') { currentX = sx; currentY = sy; }
        draw();
    };

    canvas.onmouseup = () => {
        isPanning = false;
        if (spacePressed) container.style.cursor = 'grab';
        if (!isDrawing) return;
        if (currentTool === 'brush') { if (currentPath.length > 1) elements.push({type: 'poly', points: [...currentPath]}); } 
        else if (dragMode === 'create') {
            if (currentX !== startX || currentY !== startY) elements.push({type: currentTool, x1: startX, y1: startY, x2: currentX, y2: currentY});
        }
        isDrawing = false; dragMode = null; activeHandle = null; currentPath = []; scheduleASCII(); draw();
    };

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 绘制背景网格 (随视角移动)
        ctx.save();
        ctx.beginPath();
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 1;
        const startGX = camX % GRID;
        const startGY = camY % GRID;
        for (let x = startGX; x < canvas.width; x += GRID) { ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); }
        for (let y = startGY; y < canvas.height; y += GRID) { ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); }
        ctx.stroke();

        // 绘制元素
        ctx.translate(camX, camY);
        elements.forEach((el, i) => {
            const isSel = (i === selectedIdx);
            ctx.strokeStyle = isSel ? "#38bdf8" : "#94a3b8";
            ctx.lineWidth = isSel ? 3 : 2;
            if (el.type === 'poly') {
                ctx.beginPath(); ctx.moveTo(el.points[0].x, el.points[0].y);
                el.points.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
            } else if (el.type === 'rect') {
                ctx.strokeRect(el.x1, el.y1, el.x2 - el.x1, el.y2 - el.y1);
            } else if (el.type === 'text') {
                ctx.fillStyle = isSel ? "#38bdf8" : "#f8fafc"; ctx.font = "bold 14px monospace";
                ctx.fillText(el.text, el.x1 + 4, el.y1 + 14);
            } else {
                ctx.beginPath(); ctx.moveTo(el.x1, el.y1); ctx.lineTo(el.x2, el.y2); ctx.stroke();
                if (el.type.includes('arrow')) {
                    const angle = Math.atan2(el.y2 - el.y1, el.x2 - el.x1);
                    drawArrowHead(ctx, el.x2, el.y2, angle);
                    if (el.type === 'arrow2') drawArrowHead(ctx, el.x1, el.y1, angle + Math.PI);
                }
            }
            if (isSel && el.type !== 'text' && el.type !== 'poly') {
                ctx.fillStyle = "#38bdf8";
                const hs = el.type === 'rect' ? [[el.x1,el.y1],[el.x2,el.y1],[el.x1,el.y2],[el.x2,el.y2]] : [[el.x1,el.y1],[el.x2,el.y2]];
                hs.forEach(h => ctx.fillRect(h[0]-5, h[1]-5, 10, 10));
            }
        });

        // 绘制正在画的内容
        if (isDrawing && currentTool !== 'select') {
            ctx.strokeStyle = "#38bdf8"; ctx.lineWidth = 2;
            if (currentTool === 'brush') {
                if (currentPath.length > 0) { ctx.beginPath(); ctx.moveTo(currentPath[0].x, currentPath[0].y); currentPath.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke(); }
            } else if (dragMode === 'create') {
                if (currentTool === 'rect') ctx.strokeRect(startX, startY, currentX - startX, currentY - startY);
                else { ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(currentX, currentY); ctx.stroke(); }
            }
        }
        ctx.restore();
    }

    function drawArrowHead(ctx, x, y, angle) {
        ctx.save(); ctx.translate(x, y); ctx.rotate(angle); ctx.fillStyle = ctx.strokeStyle;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-10,-5); ctx.lineTo(-10,5); ctx.closePath(); ctx.fill(); ctx.restore();
    }

    function scheduleASCII() { if (asciiTimer) clearTimeout(asciiTimer); asciiTimer = setTimeout(updateASCII, 30); }

    function updateASCII() {
        if (!elements.length) { output.value = ""; return; }
        
        // 计算内容的最小边界，使 ASCII 生成不带多余空格
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        elements.forEach(el => {
            const pts = el.points || [{x:el.x1, y:el.y1}, {x:el.x2 || el.x1, y:el.y2 || el.y1}];
            pts.forEach(p => {
                const gx = Math.round(p.x/GRID), gy = Math.round(p.y/GRID);
                minX = Math.min(minX, gx); minY = Math.min(minY, gy);
                maxX = Math.max(maxX, gx); maxY = Math.max(maxY, gy);
            });
            if (el.type === 'text') maxX = Math.max(maxX, Math.round(el.x1/GRID) + el.text.length);
        });

        let width = (maxX - minX + 2), height = (maxY - minY + 2);
        let grid = Array(height).fill().map(() => Array(width * 2).fill(' '));

        elements.forEach(el => {
            const ox = -minX, oy = -minY; // 相对偏移，保证生成的图形从 (0,0) 开始
            if (el.type === 'poly') { 
                for(let i=0; i<el.points.length-1; i++) renderLine(grid, el.points[i], el.points[i+1], 'line', ox, oy); 
            } 
            else if (el.type === 'rect') {
                const x1=Math.round(el.x1/GRID)+ox, y1=Math.round(el.y1/GRID)+oy, x2=Math.round(el.x2/GRID)+ox, y2=Math.round(el.y2/GRID)+oy;
                const lx=Math.min(x1,x2)*2, rx=Math.max(x1,x2)*2, ty=Math.min(y1,y2), by=Math.max(y1,y2);
                if(grid[ty]){ grid[ty][lx]=grid[ty][rx]=grid[by][lx]=grid[by][rx]='+'; }
                for(let x=lx+1; x<rx; x++) { if(grid[ty]) grid[ty][x]=grid[by][x]='-'; }
                for(let y=ty+1; y<by; y++) { if(grid[y]) grid[y][lx]=grid[y][rx]='|'; }
            } else if (el.type === 'text') {
                const ty = Math.round(el.y1/GRID)+oy, txStart = (Math.round(el.x1/GRID)+ox)*2;
                for(let i=0; i<el.text.length; i++) { if(grid[ty]) grid[ty][txStart + i] = el.text[i]; }
            } else {
                const x1 = Math.round(el.x1/GRID), y1 = Math.round(el.y1/GRID), x2 = Math.round(el.x2/GRID), y2 = Math.round(el.y2/GRID);
                if (x1 === x2 || y1 === y2) renderLine(grid, {x:el.x1, y:el.y1}, {x:el.x2, y:el.y2}, el.type, ox, oy);
            }
        });
        output.value = grid.map(row => row.join('').trimEnd()).join('\n');
    }

    function renderLine(grid, p1, p2, type, ox, oy) {
        const x1=Math.round(p1.x/GRID)+ox, y1=Math.round(p1.y/GRID)+oy, x2=Math.round(p2.x/GRID)+ox, y2=Math.round(p2.y/GRID)+oy;
        const lx=Math.min(x1,x2)*2, rx=Math.max(x1,x2)*2, ty=Math.min(y1,y2), by=Math.max(y1,y2);
        if (y1 === y2) {
            for(let x=lx; x<=rx; x++) if(grid[y1] && (grid[y1][x]===' '||grid[y1][x]==='|')) grid[y1][x]='-';
            if(type.includes('arrow')) grid[y2][x2*2]=(x2>x1)?'>':'<';
            if(type === 'arrow2') grid[y1][x1*2]=(x2>x1)?'<':'>';
        } else if (x1 === x2) {
            for(let y=ty; y<=by; y++) if(grid[y] && (grid[y][x1*2]===' '||grid[y][x1*2]==='-')) grid[y][x1*2]='|';
            if(type.includes('arrow')) grid[y2][x2*2]=(y2>y1)?'v':'^';
            if(type === 'arrow2') grid[y1][x1*2]=(y2>y1)?'^':'v';
        }
        if(grid[y1] && !'v^<>'.includes(grid[y1][x1*2])) grid[y1][x1*2]=(grid[y1][x1*2]!=='-'&&grid[y1][x1*2]!=='|')?grid[y1][x1*2]:'+';
        if(grid[y2] && !'v^<>'.includes(grid[y2][x2*2])) grid[y2][x2*2]=(grid[y2][x2*2]!=='-'&&grid[y2][x2*2]!=='|')?grid[y2][x2*2]:'+';
    }

    function clearCanvas() { elements = []; camX=0; camY=0; scheduleASCII(); draw(); }
    function copyToClipboard() { output.select(); document.execCommand('copy'); }
    canvas.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
